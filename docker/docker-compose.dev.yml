name: safecity-dev

# Uso recomendado para el día a día de desarrollo (Fases 2 en adelante):
# este compose levanta SOLO la infraestructura de datos (Postgres + Redis).
# El backend y el frontend se ejecutan en local con `pnpm dev` para tener
# hot-reload real, en lugar de reconstruir imágenes Docker en cada cambio.
#
# Uso: docker compose -f docker/docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: safecity-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: safecity
      POSTGRES_PASSWORD: safecity_dev_password
      POSTGRES_DB: safecity
    ports:
      - "5432:5432"
    volumes:
      - safecity_postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safecity -d safecity"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: safecity-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  safecity_postgres_dev_data:
