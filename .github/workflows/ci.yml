name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: safecity
          POSTGRES_PASSWORD: safecity_dev_password
          POSTGRES_DB: safecity
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U safecity -d safecity"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://safecity:safecity_dev_password@localhost:5432/safecity?schema=public
      JWT_SECRET: ci_jwt_secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Generar cliente de Prisma
        run: pnpm --filter @safecity/backend prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
